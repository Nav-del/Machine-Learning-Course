<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Score Predictor</title>
</head>

<body>

    <h1>Predict Exam Score</h1>

    <form action="/" method="POST">
        <label>Enter Hours Studied:</label><br><br>

        <input type="number" name="hrs" step="0.1" placeholder="Enter hours studied" required>

        <input type="submit" value="Predict">
    </form>

    <br>

    {% if prediction %}
    <h2>Predicted Marks: {{ prediction }}</h2>
    {% endif %}

</body>

</html>
